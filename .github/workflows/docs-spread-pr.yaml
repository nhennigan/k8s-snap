name: Docs Spread PR

on:
  pull_request:
    paths:
      - docs/canonicalk8s/snap/tutorial/**
      - docs/canonicalk8s/snap/howto/**
      - docs/canonicalk8s/snap/reference/disa-stig-audit.md
      # - docs/canonicalk8s/charm/tutorial/**
      # - docs/canonicalk8s/charm/howto/**

permissions:
  contents: read

jobs:
  docs-spread-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout upstream spread script
        uses: actions/checkout@v4
        with:
          repository: canonical/operator-workflows
          sparse-checkout: |
            spread/create_spread_task_file.py
          sparse-checkout-cone-mode: false
          path: workflow-scripts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Generate tasks for changed docs
        shell: bash
        run: |
          set -euo pipefail

          rm -rf tests/spread-generated
          mkdir -p tests/spread-generated
          
          mapfile -t changed_files < <(
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" \
            | grep -E '^docs/canonicalk8s/(snap|charm)/(tutorial|howto|reference)/.*\.(md|markdown|rst|rest)$' \
            || true
          )

          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "No docs files needing spread tests changed in this PR."
            echo "NO_SUITES=true" >> "$GITHUB_ENV"
            exit 0
          fi

          
          # Create all suite directories so spread doesn't fail reading spread.yaml
          mkdir -p tests/spread-generated/{disa_stig_chain,snap_clean,snap_bootstrapped,charm_clean,charm_bootstrapped}

          declare -A suites_seen=()
          generated_any=false

          scenario_trigger=false
          for file in "${changed_files[@]}"; do
            case "$file" in
              docs/canonicalk8s/snap/howto/install/fips.md|\
              docs/canonicalk8s/snap/howto/networking/ufw.md|\
              docs/canonicalk8s/snap/howto/install/disa-stig.md|\
              docs/canonicalk8s/snap/reference/disa-stig-audit.md)
                scenario_trigger=true
                break
                ;;
            esac
          done

          for file in "${changed_files[@]}"; do
            # When scenario mode is active, these docs are tested only through
            # the combined disa_stig_chain task to avoid duplicate runs.
            if [[ "$scenario_trigger" == true ]]; then
              case "$file" in
                docs/canonicalk8s/snap/howto/install/fips.md|\
                docs/canonicalk8s/snap/howto/networking/ufw.md|\
                docs/canonicalk8s/snap/howto/install/disa-stig.md|\
                docs/canonicalk8s/snap/reference/disa-stig-audit.md)
                  echo "Skipping $file in per-doc generation (covered by disa_stig_chain scenario)"
                  continue
                  ;;
              esac
            fi

            marker_suite="$(grep -Eo 'SPREAD SUITE:\s*[a-z_]+' "$file" | head -n1 | sed -E 's/.*:\s*//' || true)"

            if [[ -z "$marker_suite" ]]; then
              echo "Skipping $file (no SPREAD SUITE marker)"
              continue
            fi

            suite="$marker_suite"

            case "$suite" in
              snap_clean|snap_bootstrapped|charm_clean|charm_bootstrapped) ;;
              *)
                echo "Unsupported SPREAD SUITE marker '$suite' in $file"
                exit 1
                ;;
            esac

            rel="${file#docs/canonicalk8s/}"
            rel="${rel%.*}"
            # Flatten: use sanitized path with slashes replaced to avoid intermediate dirs
            task_name=$(echo "$rel" | sed 's|/|-|g')
            out_dir="tests/spread-generated/${suite}/${task_name}"

            mkdir -p "$out_dir"
            python3 docs/tools/create_spread_task_file.py \
              "$file" \
              "$out_dir/task.yaml"

            suites_seen["$suite"]=1
            generated_any=true
          done

          # DISA scenario: if any scenario source doc changes, build one ordered
          # scenario task from all required docs (including unchanged dependencies).
          if [[ "$scenario_trigger" == true ]]; then
            scenario_tmp_dir="/tmp/disa-stig-scenario"
            rm -rf "$scenario_tmp_dir"
            mkdir -p "$scenario_tmp_dir"

            scenario_docs=(
              "docs/canonicalk8s/snap/howto/install/fips.md"
              "docs/canonicalk8s/snap/howto/networking/ufw.md"
              "docs/canonicalk8s/snap/howto/install/disa-stig.md"
              "docs/canonicalk8s/snap/reference/disa-stig-audit.md"
            )

            fips_task="$scenario_tmp_dir/fips.task.yaml"
            ufw_task="$scenario_tmp_dir/ufw.task.yaml"
            disa_stig_task="$scenario_tmp_dir/disa-stig.task.yaml"
            disa_stig_audit_task="$scenario_tmp_dir/disa-stig-audit.task.yaml"

            python3 docs/tools/create_spread_task_file.py "${scenario_docs[0]}" "$fips_task"
            python3 docs/tools/create_spread_task_file.py "${scenario_docs[1]}" "$ufw_task"
            python3 docs/tools/create_spread_task_file.py "${scenario_docs[2]}" "$disa_stig_task"
            python3 docs/tools/create_spread_task_file.py "${scenario_docs[3]}" "$disa_stig_audit_task"

            scenario_tasks=(
              "$fips_task"
              "$ufw_task"
              "$disa_stig_task"
              "$disa_stig_audit_task"
            )

            for task_file in "${scenario_tasks[@]}"; do
              if [[ ! -f "$task_file" ]]; then
                echo "Expected scenario task file not found: $task_file"
                ls -la "$scenario_tmp_dir" || true
                exit 1
              fi
            done

            python3 docs/tools/combine_spread_tasks.py \
              --output tests/spread-generated/disa_stig_chain/chain-disa-stig/task.yaml \
              --summary "DISA STIG chain scenario" \
              --kill-timeout "30m" \
              "${scenario_tasks[@]}"

            suites_seen["disa_stig_chain"]=1
            generated_any=true
          fi

          if [[ "$generated_any" != true ]]; then
            echo "No docs files with SPREAD SUITE markers changed in this PR."
            echo "NO_SUITES=true" >> "$GITHUB_ENV"
            exit 0
          fi

          printf "%s\n" "${!suites_seen[@]}" | sort > /tmp/spread_suites.txt

          {
            echo "SPREAD_SUITES<<EOF"
            cat /tmp/spread_suites.txt
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Install spread
        if: env.NO_SUITES != 'true'
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/snapcore/spread/cmd/spread@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run spread suites
        if: env.NO_SUITES != 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo adduser --gecos "" --disabled-password ubuntu || true
          echo "ubuntu:ubuntu" | sudo chpasswd || true

          while IFS= read -r suite; do
            [[ -z "$suite" ]] && continue
            echo "Running docs suite: $suite"
            spread -vv "multipass:ubuntu-24.04-64:tests/spread-generated/${suite}/"
          done <<< "$SPREAD_SUITES"
